AWSTemplateFormatVersion: 2010-09-09
Description: >-
    tetra-backend (Updated for Binary Support)

Transform:
    - AWS::Serverless-2016-10-31

Parameters:
    Stage:
        Type: String
        AllowedValues:
            - poc
            - stg
        Default: poc

    LocalAllowedOrigin:
        Type: String
        Default: 'http://localhost:3001'
        Description: 'Allowed Origin for local development (POC)'

Conditions:
    IsStg: !Equals [!Ref Stage, stg]
    IsPoc: !Equals [!Ref Stage, poc]

# ============================
#  追加：全 Lambda へ環境変数を付与
# ============================
Globals:
    Function:
        Environment:
            Variables:
                IS_STG: !If
                    - IsStg
                    - 'true'
                    - 'false'
                COGNITO_USER_POOL_ID: !Ref TetraUserPool
                COGNITO_CLIENT_ID: !Ref TetraUserPoolClient
                BLOB_BASE_URL: 'https://tetra-images-poc.s3.ap-northeast-1.amazonaws.com'
                USER_MESSAGE_TABLE_NAME: !Ref UserMessagesTable
                POINT_INFO_TABLE_NAME: !Ref PointInfosTable
                POINT_EVENT_TABLE_NAME: !Ref PointEventsTable
                PROFILE_TABLE_NAME: !Ref ProfilesTable
                USER_TABLE_NAME: !Ref UsersTable
                DEVICE_TOKEN_TABLE_NAME: !Ref DeviceTokensTable
                THREAD_TABLE_NAME: !Ref ThreadsTable
                RESPONSE_TABLE_NAME: !Ref ResponsesTable
                REACTION_TABLE_NAME: !Ref ReactionsTable
                MESSAGE_TABLE_NAME: !Ref MessagesTable
                BROADCAST_TABLE_NAME: !Ref MessageBroadcastsTable
Resources:
    Tetra:
        Type: AWS::Serverless::Api
        Properties:
            Name: !If
                - IsStg
                - 'tetra-stg'
                - 'tetra-poc'
            StageName: Prod
            Auth:
                Authorizers:
                    CognitoAuthorizer:
                        UserPoolArn: !GetAtt TetraUserPool.Arn
                        Identity:
                            Header: Authorization
                DefaultAuthorizer: CognitoAuthorizer
                AddDefaultAuthorizerToCorsPreflight: false
            Cors:
                AllowMethods: "'GET,PUT,POST,DELETE,OPTIONS'"
                AllowOrigin: !If
                    - IsStg
                    - "'*'" # TODO: 本番環境に変更する
                    - "'https://tetra-web-chi.vercel.app','http://localhost:3000'"
                AllowHeaders: "'Content-Type,Authorization'"
                AllowCredentials: true

    TetraAdmin:
        Type: AWS::Serverless::Api
        Properties:
            Name: !If
                - IsStg
                - 'tetra-admin-stg'
                - 'tetra-admin-poc'
            StageName: Prod
            Auth:
                AddDefaultAuthorizerToCorsPreflight: false
            Cors:
                AllowMethods: "'GET,PUT,POST,DELETE,OPTIONS'"
                AllowOrigin: !If
                    - IsStg
                    - "'*'" # TODO: 本番環境に変更する
                    - "'https://tetra-backoffice.vercel.app','http://localhost:3000','http://localhost:3001'"
                AllowHeaders: "'Content-Type,Authorization'"
                AllowCredentials: true

    # ============================
    #  Cognito
    # ============================
    TetraUserPool:
        Type: AWS::Cognito::UserPool
        Properties:
            UserPoolName: !Sub 'tetra-user-pool-${Stage}'
            UsernameAttributes:
                - email
            UsernameConfiguration:
                CaseSensitive: false
            AutoVerifiedAttributes:
                - email
            Policies:
                PasswordPolicy:
                    MinimumLength: 8
                    RequireLowercase: true
                    RequireNumbers: true
                    RequireSymbols: false
                    RequireUppercase: true
            Schema:
                - Name: email
                  Required: true
                  Mutable: true
                - Name: profile
                  AttributeDataType: String
                  Mutable: true
                  Required: false

    TetraUserPoolClient:
        Type: AWS::Cognito::UserPoolClient
        Properties:
            ClientName: !Sub 'tetra-app-client-${Stage}'
            UserPoolId: !Ref TetraUserPool
            GenerateSecret: true
            ExplicitAuthFlows:
                - ALLOW_USER_SRP_AUTH
                - ALLOW_REFRESH_TOKEN_AUTH
                - ALLOW_ADMIN_USER_PASSWORD_AUTH
            AllowedOAuthFlows:
                - code
            AllowedOAuthScopes:
                - email
                - openid
                - profile
            AllowedOAuthFlowsUserPoolClient: true
            CallbackURLs: !If
                - IsPoc
                - - http://localhost:3000/api/auth/callback/cognito
                  - https://tetra-web-chi.vercel.app/api/auth/callback/cognito
                - - https://tetra-web-chi.vercel.app/api/auth/callback/cognito
            LogoutURLs: !If
                - IsPoc
                - - http://localhost:3000
                  - https://tetra-web-chi.vercel.app
                - - https://tetra-web-chi.vercel.app
            SupportedIdentityProviders:
                - COGNITO

    TetraUserPoolDomain:
        Type: AWS::Cognito::UserPoolDomain
        Properties:
            Domain: !Sub 'tetra-${Stage}-${AWS::AccountId}'
            UserPoolId: !Ref TetraUserPool

    # 画像保管用S3バケット
    ImageBucket:
        Type: AWS::S3::Bucket
        Properties:
            BucketName: !If
                - IsStg
                - 'tetra-images-stg'
                - 'tetra-images-poc'
            PublicAccessBlockConfiguration:
                BlockPublicAcls: false
                BlockPublicPolicy: false
                IgnorePublicAcls: false
                RestrictPublicBuckets: false
            WebsiteConfiguration:
                IndexDocument: index.html
                ErrorDocument: error.html
            CorsConfiguration:
                CorsRules:
                    - AllowedOrigins: !Split
                          - ','
                          - !If
                            - IsPoc
                            - 'https://tetra-web-chi.vercel.app,http://localhost:3000,http://localhost:3001'
                            - 'https://tetra-web-chi.vercel.app'
                      AllowedMethods:
                          - GET
                          - PUT
                          - POST
                          - HEAD
                      AllowedHeaders:
                          - '*'
                      MaxAge: 3000
            LifecycleConfiguration:
                Rules:
                    - Id: DeleteOldVersions
                      Status: Enabled
                      NoncurrentVersionExpirationInDays: 30
            VersioningConfiguration:
                Status: Enabled

    # Lambda関数からのS3アクセス用ポリシー
    ImageBucketPolicy:
        Type: AWS::S3::BucketPolicy
        Properties:
            Bucket: !Ref ImageBucket
            PolicyDocument:
                Statement:
                    - Sid: PublicReadGetObject
                      Effect: Allow
                      Principal: '*'
                      Action: s3:GetObject
                      Resource: !Sub '${ImageBucket.Arn}/*'
                    - Sid: AllowLambdaAccess
                      Effect: Allow
                      Principal:
                          Service: lambda.amazonaws.com
                      Action:
                          - s3:PutObject
                          - s3:DeleteObject
                      Resource: !Sub '${ImageBucket.Arn}/*'
                      Condition:
                          StringEquals:
                              aws:SourceAccount: !Ref AWS::AccountId

    # User
    UserFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/user/
            Handler: index.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/firebase/*'
                - Statement:
                      - Effect: Allow
                        Action:
                            - dynamodb:BatchGetItem
                            - dynamodb:BatchWriteItem
                            - dynamodb:PutItem
                            - dynamodb:DeleteItem
                            - dynamodb:GetItem
                            - dynamodb:Scan
                            - dynamodb:Query
                            - dynamodb:UpdateItem
                        Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*'
                - S3CrudPolicy:
                      BucketName: !Ref ImageBucket
                - Statement:
                      - Effect: Allow
                        Action:
                            - cognito-idp:AdminDeleteUser
                        Resource: !GetAtt TetraUserPool.Arn
            Architectures:
                - x86_64
            Events:
                UserCreate:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /user
                        Method: POST
                        Auth:
                            Authorizer: CognitoAuthorizer
                FindUser:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /user
                        Method: GET
                        Auth:
                            Authorizer: CognitoAuthorizer
                DeleteUser:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /user
                        Method: DELETE
                        Auth:
                            Authorizer: CognitoAuthorizer
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - index.ts

    MapFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/map/
            Handler: index.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
