        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - index.ts

    AdminUserDetailFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/admin/users/detail/
            Handler: index.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/firebase/*'
            Architectures:
                - x86_64
            Events:
                GetUser:
                    Type: Api
                    Properties:
                        RestApiId: !Ref TetraAdmin
                        Path: /admin/users/{userId}
