                        RestApiId: !Ref Tetra
                        Path: /upload/presigned-url
                        Method: POST
                        Auth:
                            Authorizer: CognitoAuthorizer
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - post.ts

    # ============================
    #  Admin
    # ============================
    AdminMessageFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/admin/inbox/
            Handler: index.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/firebase/*'
                - Statement:
                      - Effect: Allow
                        Action:
                            - dynamodb:BatchGetItem
                            - dynamodb:BatchWriteItem
                            - dynamodb:PutItem
                            - dynamodb:DeleteItem
                            - dynamodb:GetItem
                            - dynamodb:Scan
                            - dynamodb:Query
                            - dynamodb:UpdateItem
                        Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*'
                - S3CrudPolicy:
                      BucketName: !Ref ImageBucket
            Architectures:
                - x86_64
            Events:
                SendSystemMessage:
                    Type: Api
                    Properties:
                        RestApiId: !Ref TetraAdmin
                        Path: /admin/inbox/messages
                        Method: POST

                ListSystemMessages:
                    Type: Api
                    Properties:
                        RestApiId: !Ref TetraAdmin
                        Path: /admin/inbox/messages
                        Method: GET

                OptionsSystemMessages:
                    Type: Api
                    Properties:
                        RestApiId: !Ref TetraAdmin
                        Path: /admin/inbox/messages
                        Method: OPTIONS

        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - index.ts

    AdminMessageDetailFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/admin/inbox/{messageId}/
            Handler: index.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/firebase/*'
                - Statement:
                      - Effect: Allow
                        Action:
                            - dynamodb:BatchGetItem
                            - dynamodb:BatchWriteItem
                            - dynamodb:PutItem
                            - dynamodb:DeleteItem
                            - dynamodb:GetItem
                            - dynamodb:Scan
                            - dynamodb:Query
                            - dynamodb:UpdateItem
                        Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*'
                - S3CrudPolicy:
                      BucketName: !Ref ImageBucket
            Architectures:
                - x86_64
            Events:
                DeleteSystemMessage:
                    Type: Api
                    Properties:
                        RestApiId: !Ref TetraAdmin
                        Path: /admin/inbox/messages/{messageId}
                        Method: DELETE

        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - index.ts

    AdminUserListFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/admin/users/
            Handler: index.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/firebase/*'
                - Statement:
                      - Effect: Allow
                        Action:
                            - dynamodb:BatchGetItem
                            - dynamodb:BatchWriteItem
                            - dynamodb:PutItem
                            - dynamodb:DeleteItem
                            - dynamodb:GetItem
                            - dynamodb:Scan
                            - dynamodb:Query
                            - dynamodb:UpdateItem
                        Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*'
            Architectures:
                - x86_64
            Events:
                ListUsers:
                    Type: Api
                    Properties:
                        RestApiId: !Ref TetraAdmin
                        Path: /admin/users
