    # ============================
    #  DynamoDB Tables
    # ============================
    MessagesTable:
        Type: AWS::DynamoDB::Table
        Properties:
            TableName: 'Messages'
            AttributeDefinitions:
                - AttributeName: id
                  AttributeType: S
                - AttributeName: type
                  AttributeType: S
                - AttributeName: senderUserId
                  AttributeType: S
            KeySchema:
                - AttributeName: id
                  KeyType: HASH
            GlobalSecondaryIndexes:
                - IndexName: TypeIndex
                  KeySchema:
                      - AttributeName: type
                        KeyType: HASH
                  Projection:
                      ProjectionType: ALL
                - IndexName: SenderIdIndex
                  KeySchema:
                      - AttributeName: senderUserId
                        KeyType: HASH
                  Projection:
                      ProjectionType: ALL
            BillingMode: PAY_PER_REQUEST

    MessageBroadcastsTable:
        Type: AWS::DynamoDB::Table
        Properties:
            TableName: 'MessageBroadcasts'
            AttributeDefinitions:
                - AttributeName: id
                  AttributeType: S
                - AttributeName: messageId
                  AttributeType: S
                - AttributeName: status
                  AttributeType: S
            KeySchema:
                - AttributeName: id
                  KeyType: HASH
            GlobalSecondaryIndexes:
                - IndexName: MessageIdIndex
                  KeySchema:
                      - AttributeName: messageId
                        KeyType: HASH
                  Projection:
                      ProjectionType: ALL
                - IndexName: StatusIndex
                  KeySchema:
                      - AttributeName: status
                        KeyType: HASH
                  Projection:
                      ProjectionType: ALL
            BillingMode: PAY_PER_REQUEST

    UserMessagesTable:
        Type: AWS::DynamoDB::Table
        Properties:
            TableName: 'UserMessages'
            AttributeDefinitions:
                - AttributeName: id
                  AttributeType: S
                - AttributeName: userId
                  AttributeType: S
                - AttributeName: messageId
                  AttributeType: S
                - AttributeName: deliveredAt
                  AttributeType: S
            KeySchema:
                - AttributeName: id
                  KeyType: HASH
            GlobalSecondaryIndexes:
                - IndexName: UserIdIndex
                  KeySchema:
                      - AttributeName: userId
                        KeyType: HASH
                      - AttributeName: deliveredAt
                        KeyType: RANGE
                  Projection:
                      ProjectionType: ALL
                - IndexName: MessageIdIndex
                  KeySchema:
                      - AttributeName: messageId
                        KeyType: HASH
                  Projection:
                      ProjectionType: ALL
            BillingMode: PAY_PER_REQUEST

    PointInfosTable:
        Type: AWS::DynamoDB::Table
        Properties:
            TableName: 'PointInfos'
            AttributeDefinitions:
                - AttributeName: id
                  AttributeType: S
                - AttributeName: category
                  AttributeType: S
            KeySchema:
                - AttributeName: id
                  KeyType: HASH
            GlobalSecondaryIndexes:
                - IndexName: CategoryIndex
                  KeySchema:
                      - AttributeName: category
                        KeyType: HASH
                  Projection:
                      ProjectionType: ALL
            BillingMode: PAY_PER_REQUEST

    PointEventsTable:
        Type: AWS::DynamoDB::Table
        Properties:
            TableName: 'PointEvents'
            AttributeDefinitions:
                - AttributeName: id
                  AttributeType: S
                - AttributeName: pointInfoId
                  AttributeType: S
                - AttributeName: threadName
                  AttributeType: S
            KeySchema:
                - AttributeName: id
                  KeyType: HASH
            GlobalSecondaryIndexes:
                - IndexName: PointInfoIdIndex
                  KeySchema:
                      - AttributeName: pointInfoId
                        KeyType: HASH
                  Projection:
                      ProjectionType: ALL
                - IndexName: ThreadNameIndex
                  KeySchema:
                      - AttributeName: threadName
                        KeyType: HASH
                  Projection:
                      ProjectionType: ALL
            BillingMode: PAY_PER_REQUEST

    ProfilesTable:
        Type: AWS::DynamoDB::Table
        Properties:
            TableName: 'Profiles'
            AttributeDefinitions:
                - AttributeName: profileId
                  AttributeType: S
                - AttributeName: userId
                  AttributeType: S
            KeySchema:
                - AttributeName: profileId
                  KeyType: HASH
            GlobalSecondaryIndexes:
                - IndexName: UserIdIndex
                  KeySchema:
                      - AttributeName: userId
                        KeyType: HASH
                  Projection:
                      ProjectionType: ALL
            BillingMode: PAY_PER_REQUEST

    UsersTable:
        Type: AWS::DynamoDB::Table
        Properties:
            TableName: 'Users'
            AttributeDefinitions:
                - AttributeName: userId
                  AttributeType: S
                - AttributeName: authId
                  AttributeType: S
            KeySchema:
                - AttributeName: userId
                  KeyType: HASH
            GlobalSecondaryIndexes:
                - IndexName: AuthIdIndex
                  KeySchema:
                      - AttributeName: authId
                        KeyType: HASH
                  Projection:
                      ProjectionType: ALL
            BillingMode: PAY_PER_REQUEST

    DeviceTokensTable:
        Type: AWS::DynamoDB::Table
        Properties:
            TableName: 'DeviceTokens'
            AttributeDefinitions:
                - AttributeName: token
                  AttributeType: S
                - AttributeName: userId
                  AttributeType: S
            KeySchema:
                - AttributeName: token
                  KeyType: HASH
            GlobalSecondaryIndexes:
                - IndexName: UserIdIndex
                  KeySchema:
                      - AttributeName: userId
                        KeyType: HASH
                  Projection:
                      ProjectionType: ALL
            BillingMode: PAY_PER_REQUEST

    ThreadsTable:
        Type: AWS::DynamoDB::Table
        Properties:
            TableName: 'Threads'
            AttributeDefinitions:
                - AttributeName: id
                  AttributeType: S
                - AttributeName: ownerUserId
                  AttributeType: S
                - AttributeName: parentThreadId
                  AttributeType: S
                - AttributeName: mapPointInfoId
                  AttributeType: S
            KeySchema:
                - AttributeName: id
                  KeyType: HASH
            GlobalSecondaryIndexes:
                - IndexName: OwnerUserIdIndex
                  KeySchema:
                      - AttributeName: ownerUserId
                        KeyType: HASH
                  Projection:
                      ProjectionType: ALL
                - IndexName: ParentThreadIdIndex
                  KeySchema:
                      - AttributeName: parentThreadId
                        KeyType: HASH
                  Projection:
                      ProjectionType: ALL
                - IndexName: MapPointInfoIdIndex
                  KeySchema:
                      - AttributeName: mapPointInfoId
                        KeyType: HASH
                  Projection:
                      ProjectionType: ALL
            BillingMode: PAY_PER_REQUEST

    ResponsesTable:
        Type: AWS::DynamoDB::Table
        Properties:
            TableName: 'Responses'
            AttributeDefinitions:
                - AttributeName: id
                  AttributeType: S
                - AttributeName: parentId
                  AttributeType: S
                - AttributeName: ownerUserId
                  AttributeType: S
            KeySchema:
                - AttributeName: id
                  KeyType: HASH
            GlobalSecondaryIndexes:
                - IndexName: ParentIdIndex
                  KeySchema:
                      - AttributeName: parentId
                        KeyType: HASH
                  Projection:
                      ProjectionType: ALL
                - IndexName: OwnerUserIdIndex
                  KeySchema:
                      - AttributeName: ownerUserId
                        KeyType: HASH
                  Projection:
                      ProjectionType: ALL
            BillingMode: PAY_PER_REQUEST

    ReactionsTable:
        Type: AWS::DynamoDB::Table
        Properties:
            TableName: 'Reactions'
            AttributeDefinitions:
                - AttributeName: id
                  AttributeType: S
                - AttributeName: parentId
                  AttributeType: S
            KeySchema:
                - AttributeName: id
                  KeyType: HASH
            GlobalSecondaryIndexes:
                - IndexName: ParentIdIndex
                  KeySchema:
                      - AttributeName: parentId
                        KeyType: HASH
                  Projection:
                      ProjectionType: ALL
            BillingMode: PAY_PER_REQUEST

Outputs:
    TetraApiEndpoint:
        Description: 'API Gateway endpoint URL for Prod stage'
        Value: !Sub 'https://${Tetra}.execute-api.${AWS::Region}.amazonaws.com/Prod/'
    TetraApiId:
        Description: 'API Gateway ID'
        Value: !Ref Tetra
    ImageBucketName:
        Description: 'S3 bucket name for images'
        Value: !Ref ImageBucket
    ImageBucketArn:
        Description: 'S3 bucket ARN for images'
        Value: !GetAtt ImageBucket.Arn
