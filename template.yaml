AWSTemplateFormatVersion: 2010-09-09
Description: >-
    tetra-backend (Updated for Binary Support)

Transform:
    - AWS::Serverless-2016-10-31

Parameters:
    Stage:
        Type: String
        AllowedValues:
            - poc
            - stg
        Default: poc

    LocalAllowedOrigin:
        Type: String
        Default: 'http://localhost:3001'
        Description: 'Allowed Origin for local development (POC)'

Conditions:
    IsStg: !Equals [!Ref Stage, stg]
    IsPoc: !Equals [!Ref Stage, poc]

# ============================
#  追加：全 Lambda へ環境変数を付与
# ============================
Globals:
    Function:
        Environment:
            Variables:
                IS_STG: !If
                    - IsStg
                    - 'true'
                    - 'false'
                COGNITO_USER_POOL_ID: 'ap-northeast-1_b6QnfWCPc'
                COGNITO_CLIENT_ID: '6ls2uqvl8u1g1eo89dgibbr0a1'
                BLOB_BASE_URL: 'https://tetra-images-poc.s3.ap-northeast-1.amazonaws.com'
Resources:
    Tetra:
        Type: AWS::Serverless::Api
        Properties:
            Name: !If
                - IsStg
                - 'tetra-stg'
                - 'tetra-poc'
            StageName: Prod
            Auth:
                Authorizers:
                    CognitoAuthorizer:
                        UserPoolArn: !Sub 'arn:aws:cognito-idp:ap-northeast-1:338880795815:userpool/ap-northeast-1_b6QnfWCPc'
                        Identity:
                            Header: Authorization
                DefaultAuthorizer: CognitoAuthorizer
                AddDefaultAuthorizerToCorsPreflight: false
            Cors:
                AllowMethods: "'GET,PUT,POST,DELETE,OPTIONS'"
                AllowOrigin: !If
                    - IsStg
                    - "'*'" # TODO: 本番環境に変更する
                    - "'https://tetra-web-chi.vercel.app','http://localhost:3000'"
                AllowHeaders: "'Content-Type,Authorization'"
                AllowCredentials: true

    TetraAdmin:
        Type: AWS::Serverless::Api
        Properties:
            Name: !If
                - IsStg
                - 'tetra-admin-stg'
                - 'tetra-admin-poc'
            StageName: Prod
            Auth:
                AddDefaultAuthorizerToCorsPreflight: false
            Cors:
                AllowMethods: "'GET,PUT,POST,DELETE,OPTIONS'"
                AllowOrigin: !If
                    - IsStg
                    - "'*'" # TODO: 本番環境に変更する
                    - !Sub "'${LocalAllowedOrigin}'"
                AllowHeaders: "'Content-Type,Authorization'"
                AllowCredentials: true

    # 画像保管用S3バケット
    ImageBucket:
        Type: AWS::S3::Bucket
        Properties:
            BucketName: !If
                - IsStg
                - 'tetra-images-stg'
                - 'tetra-images-poc'
            PublicAccessBlockConfiguration:
                BlockPublicAcls: true
                BlockPublicPolicy: true
                IgnorePublicAcls: true
                RestrictPublicBuckets: true
            CorsConfiguration:
                CorsRules:
                    - AllowedOrigins: !Split
                          - ','
                          - !If
                            - IsPoc
                            - 'https://tetra-web-chi.vercel.app,http://localhost:3000,http://localhost:3001'
                            - 'https://tetra-web-chi.vercel.app'
                      AllowedMethods:
                          - GET
                          - PUT
                          - POST
                          - HEAD
                      AllowedHeaders:
                          - '*'
                      MaxAge: 3000
            LifecycleConfiguration:
                Rules:
                    - Id: DeleteOldVersions
                      Status: Enabled
                      NoncurrentVersionExpirationInDays: 30
            VersioningConfiguration:
                Status: Enabled

    # Lambda関数からのS3アクセス用ポリシー
    ImageBucketPolicy:
        Type: AWS::S3::BucketPolicy
        Properties:
            Bucket: !Ref ImageBucket
            PolicyDocument:
                Statement:
                    - Sid: AllowLambdaAccess
                      Effect: Allow
                      Principal:
                          Service: lambda.amazonaws.com
                      Action:
                          - s3:GetObject
                          - s3:PutObject
                          - s3:DeleteObject
                      Resource: !Sub '${ImageBucket.Arn}/*'
                      Condition:
                          StringEquals:
                              aws:SourceAccount: !Ref AWS::AccountId

    # User
    UserFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/user/
            Handler: index.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/firebase/*'
                - S3CrudPolicy:
                      BucketName: !Ref ImageBucket
                - Statement:
                      - Effect: Allow
                        Action:
                            - cognito-idp:AdminDeleteUser
                        Resource: !Sub 'arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/ap-northeast-1_b6QnfWCPc'
            Architectures:
                - x86_64
            Events:
                UserCreate:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /user
                        Method: POST
                        Auth:
                            Authorizer: CognitoAuthorizer
                FindUser:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /user
                        Method: GET
                        Auth:
                            Authorizer: CognitoAuthorizer
                DeleteUser:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /user
                        Method: DELETE
                        Auth:
                            Authorizer: CognitoAuthorizer
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - index.ts

    MapFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/map/
            Handler: index.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/firebase/*'
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/google/*'
                - S3CrudPolicy:
                      BucketName: !Ref ImageBucket
            Architectures:
                - x86_64
            Events:
                GetPointInfoList:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /map
                        Method: GET
                        Auth:
                            Authorizer: NONE
                CreatePointInfo:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /map
                        Method: POST
                        Auth:
                            Authorizer: CognitoAuthorizer
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - index.ts

    MapEventFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/map/event/
            Handler: post.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/firebase/*'
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/google/*'
                - S3CrudPolicy:
                      BucketName: !Ref ImageBucket
            Architectures:
                - x86_64
            Events:
                CreateEventPoint:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /map/event
                        Method: POST
                        Auth:
                            Authorizer: CognitoAuthorizer
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - post.ts

    MapChatFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/map/chat/
            Handler: post.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/firebase/*'
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/google/*'
                - S3CrudPolicy:
                      BucketName: !Ref ImageBucket
            Architectures:
                - x86_64
            Events:
                CreateChatPoint:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /map/chat
                        Method: POST
                        Auth:
                            Authorizer: CognitoAuthorizer
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - post.ts

    # timeline
    TimelineFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/timeline/
            Handler: index.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/firebase/*'
                - S3CrudPolicy:
                      BucketName: !Ref ImageBucket
            Architectures:
                - x86_64
            Events:
                GetThreadList:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /timeline
                        Method: GET
                        Auth:
                            Authorizer: NONE
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - index.ts

    # thread
    ThreadFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/timeline/thread/
            Handler: index.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/firebase/*'
                - S3CrudPolicy:
                      BucketName: !Ref ImageBucket
            Architectures:
                - x86_64
            Events:
                GetThreadList:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /timeline/thread
                        Method: GET
                        Auth:
                            Authorizer: NONE
                CreateThread:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /timeline/thread
                        Method: POST
                        Auth:
                            Authorizer: CognitoAuthorizer
                DeleteThread:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /timeline/thread
                        Method: DELETE
                        Auth:
                            Authorizer: CognitoAuthorizer
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - index.ts

    # timelineQuery
    TimelineQueryFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/timeline/query/
            Handler: index.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/firebase/*'
                - S3CrudPolicy:
                      BucketName: !Ref ImageBucket
            Architectures:
                - x86_64
            Events:
                GetThreadQuery:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /timeline/query
                        Method: GET
                        Auth:
                            Authorizer: NONE
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - index.ts

    # profile
    ProfileFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/user/profile
            Handler: index.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/firebase/*'
                - S3CrudPolicy:
                      BucketName: !Ref ImageBucket
            Architectures:
                - x86_64
            Events:
                CreateProfile:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /user/profile
                        Method: POST
                        Auth:
                            Authorizer: CognitoAuthorizer
                UpdateProfile:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /user/profile
                        Method: PUT
                        Auth:
                            Authorizer: CognitoAuthorizer
                GetProfile:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /user/profile/{userId}
                        Method: GET
                        Auth:
                            Authorizer: NONE
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - index.ts

    # inbox
    InboxSummaryFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/inbox/summary
            Handler: index.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/firebase/*'
                - S3CrudPolicy:
                      BucketName: !Ref ImageBucket
            Architectures:
                - x86_64
            Events:
                GetInboxSummary:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /inbox/summary
                        Method: GET
                        Auth:
                            Authorizer: CognitoAuthorizer
                PutInboxSummary:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /inbox/summary
                        Method: PUT
                        Auth:
                            Authorizer: CognitoAuthorizer
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - index.ts

    InboxFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/inbox/
            Handler: index.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/firebase/*'
                - S3CrudPolicy:
                      BucketName: !Ref ImageBucket
            Architectures:
                - x86_64
            Events:
                GetInbox:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /inbox
                        Method: GET
                        Auth:
                            Authorizer: CognitoAuthorizer
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - index.ts

    InboxReadAllFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/inbox/read-all/
            Handler: index.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/firebase/*'
                - S3CrudPolicy:
                      BucketName: !Ref ImageBucket
            Architectures:
                - x86_64
            Events:
                PutInboxReadAll:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /inbox/read-all
                        Method: PUT
                        Auth:
                            Authorizer: CognitoAuthorizer
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - index.ts

    InboxDetailFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/inbox/{messageId}/
            Handler: index.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/firebase/*'
                - S3CrudPolicy:
                      BucketName: !Ref ImageBucket
            Architectures:
                - x86_64
            Events:
                GetInboxDetail:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /inbox/{messageId}
                        Method: GET
                        Auth:
                            Authorizer: CognitoAuthorizer
                DeleteInboxDetail:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /inbox/{messageId}
                        Method: DELETE
                        Auth:
                            Authorizer: CognitoAuthorizer
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - index.ts

    InboxReadFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/inbox/{messageId}/read/
            Handler: index.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/firebase/*'
                - S3CrudPolicy:
                      BucketName: !Ref ImageBucket
            Architectures:
                - x86_64
            Events:
                PutInboxRead:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /inbox/{messageId}/read
                        Method: PUT
                        Auth:
                            Authorizer: CognitoAuthorizer
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - index.ts

    UploadPresignedUrlFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/upload/presigned-url/
            Handler: post.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 256
            Environment:
                Variables:
                    IMAGE_BUCKET_NAME: !Ref ImageBucket
                    CDN_DOMAIN: !If [IsStg, 'cdn-stg.example.com', !Ref AWS::NoValue]
            Policies:
                - S3CrudPolicy:
                      BucketName: !Ref ImageBucket
            Architectures:
                - x86_64
            Events:
                GetPresignedUrl:
                    Type: Api
                    Properties:
                        RestApiId: !Ref Tetra
                        Path: /upload/presigned-url
                        Method: POST
                        Auth:
                            Authorizer: CognitoAuthorizer
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - post.ts

    # ============================
    #  Admin
    # ============================
    AdminMessageFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/admin/inbox/
            Handler: index.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/firebase/*'
                - S3CrudPolicy:
                      BucketName: !Ref ImageBucket
            Architectures:
                - x86_64
            Events:
                SendSystemMessage:
                    Type: Api
                    Properties:
                        RestApiId: !Ref TetraAdmin
                        Path: /admin/inbox/messages
                        Method: POST
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - index.ts

    AdminUserListFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/admin/users/
            Handler: index.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/firebase/*'
            Architectures:
                - x86_64
            Events:
                ListUsers:
                    Type: Api
                    Properties:
                        RestApiId: !Ref TetraAdmin
                        Path: /admin/users
                        Method: GET
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - index.ts

    AdminUserDetailFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: src/interfaces/handlers/admin/users/detail/
            Handler: index.lambdaHandler
            Runtime: nodejs22.x
            Timeout: 30
            MemorySize: 512
            Policies:
                - SSMParameterWithSlashPrefixReadPolicy:
                      ParameterName: '/tetra/firebase/*'
            Architectures:
                - x86_64
            Events:
                GetUser:
                    Type: Api
                    Properties:
                        RestApiId: !Ref TetraAdmin
                        Path: /admin/users/{userId}
                        Method: GET
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                EntryPoints:
                    - index.ts

Outputs:
    TetraApiEndpoint:
        Description: 'API Gateway endpoint URL for Prod stage'
        Value: !Sub 'https://${Tetra}.execute-api.${AWS::Region}.amazonaws.com/Prod/'
    TetraApiId:
        Description: 'API Gateway ID'
        Value: !Ref Tetra
    ImageBucketName:
        Description: 'S3 bucket name for images'
        Value: !Ref ImageBucket
    ImageBucketArn:
        Description: 'S3 bucket ARN for images'
        Value: !GetAtt ImageBucket.Arn
